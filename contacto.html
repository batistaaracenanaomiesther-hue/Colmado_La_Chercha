<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Colmado La Chercha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <img src="imagenes/logo.jpg" alt="Colmado La Chercha" width="72" height="72">
      <span>La Chercha</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="acerca.html">Acerca</a>
      <a href="contacto.html" class="activo">Contacto</a>
      <button type="button" class="nav-cart" data-open-cart aria-label="Abrir carrito">
        <span class="nav-cart__icon" aria-hidden="true">🛒</span>
        <span class="nav-cart__badge is-hidden" data-cart-count>0</span>
      </button>
    </nav>
  </header>

  <section class="banner">
    <h1>Contacto</h1>
  </section>

  <section class="contacto page-main">
    <div class="formulario">
      <h2>Escríbenos</h2>
      <form id="form-contacto">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" required>

        <label for="correo">Correo</label>
        <input id="correo" name="correo" type="email">

        <label for="telefono">Teléfono</label>
        <input id="telefono" name="telefono">

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" required></textarea>

        <button type="submit" class="btn btn--primary btn--block">Enviar</button>
      </form>
      <p id="contacto-msg" style="margin-top:1rem"></p>
    </div>
    <div class="info">
      <h2>Información</h2>
      <ul>
        <li><strong>Horario:</strong> Lunes a sábado</li>
        <li><strong>Ubicación:</strong> Tu comunidad, RD</li>
        <li><strong>Panel:</strong> <a href="dashboard.html" style="color:var(--accent)">Dashboard</a> (admin)</li>
      </ul>
    </div>
  </section>

  <footer class="site-footer">
    <p>© 2026 Colmado La Chercha</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/auth-ui.js"></script>
  <script>
    document.getElementById('form-contacto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('contacto-msg');
      msg.textContent = 'Enviando…';
      try {
        await Colmado.api('/api/contact', {
          method: 'POST',
          body: JSON.stringify({
            nombre: document.getElementById('nombre').value,
            correo: document.getElementById('correo').value,
            telefono: document.getElementById('telefono').value,
            mensaje: document.getElementById('mensaje').value,
          }),
        });
        msg.style.color = 'var(--accent)';
        msg.textContent = 'Mensaje guardado. ¡Gracias!';
        e.target.reset();
      } catch (err) {
        msg.style.color = 'var(--danger)';
        msg.textContent = err.message || 'No se pudo enviar. Usa el servidor Node (npm start).';
      }
    });
  </script>
</body>
</html>
